<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            color: #4a4a4a;
            background-color: #fdfaf6;
        }
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1350&q=80'); /* Можно заменить на свое фото */
            background-size: cover;
            background-position: center;
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin-bottom: 10px;
            color: #8e7d6f;
        }
        .date { font-size: 1.5rem; letter-spacing: 3px; }
        .section { padding: 60px 20px; }
        #countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        .time-block { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-width: 70px; }
        .number { display: block; font-size: 2rem; font-weight: bold; color: #8e7d6f; }
        .details-card {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #8e7d6f;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #6f5f54; }
    </style>
</head>
<body>

    <header>
        <h1>Александр & Мария</h1>
        <div class="date">25.07.2026</div>
    </header>

    <div class="section">
        <h2>До торжества осталось:</h2>
        <div id="countdown">
            <div class="time-block"><span class="number" id="days">0</span>дн</div>
            <div class="time-block"><span class="number" id="hours">0</span>час</div>
            <div class="time-block"><span class="number" id="minutes">0</span>мин</div>
        </div>
    </div>

    <div class="section" style="background-color: #f7f2ed;">
        <div class="details-card">
            <h2>Программа дня</h2>
            <p><strong>15:00</strong> — Сбор гостей</p>
            <p><strong>16:00</strong> — Выездная церемония</p>
            <p><strong>17:00</strong> — Праздничный ужин</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <h3>Место проведения</h3>
            <p>Загородный комплекс "Лесное поместье", ул. Зеленая, 1</p>
            <a href="https://maps.google.com" target="_blank" class="btn">Открыть карту</a>
        </div>
    </div>

    <footer class="section">
        <p>Будем рады видеть вас на нашем празднике!</p>
    </footer>

    <script>
        // Установите дату свадьбы здесь
        const weddingDate = new Date("July 25, 2026 16:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "Ура! Этот день настал!";
            }
        }, 1000);
    </script>
</body>
</html>
